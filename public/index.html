<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>chord-muse</title>
  <meta
    name="description"
    content="Generate guitar-friendly chord progressions with playable fretboard diagrams, a metronome, and simple drum grooves."
  />
  <meta name="theme-color" content="#f3ede3" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="chord-muse" />
  <meta
    property="og:description"
    content="A compact chord progression generator for guitar players, with diagrams and rhythm tools in one screen."
  />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="page-shell">
    <main class="app-shell">
      <section class="panel control-deck" aria-labelledby="controls-heading">
        <div class="panel-heading deck-heading">
          <div>
            <p class="panel-kicker">chord-muse</p>
            <h2 id="controls-heading">Playable progressions, right in the pocket.</h2>
          </div>
        </div>

        <div class="status-strip">
          <div class="status-pill">
            <span class="status-label">Current key</span>
            <strong id="current-key-label">Loading…</strong>
          </div>
          <div class="status-pill">
            <span class="status-label">Groove</span>
            <strong id="groove-label">Folk Pop</strong>
          </div>
        </div>

        <div class="control-grid">
          <section class="control-block" aria-label="Key and generation controls">
            <div class="control-block-header aligned-control-header">
              <p class="panel-kicker">Key</p>
              <span class="control-caption">Randomize or lock the tonal center.</span>
            </div>

            <div class="toggle-pair">
              <label class="toggle-row">
                <span>Lock key</span>
                <input id="key-lock-toggle" type="checkbox" />
              </label>
              <label class="toggle-row">
                <span>Left-handed</span>
                <input id="left-handed-toggle" type="checkbox" />
              </label>
            </div>

            <div class="key-row">
              <label class="field field-compact key-root-field">
                <span class="field-label">Key root</span>
                <select id="key-root-select"></select>
              </label>
              <fieldset class="segmented-field mode-inline-field">
                <legend>Mode</legend>
                <div class="segmented mode-segmented inline-mode-segmented">
                  <label><input type="radio" name="mode-preference" value="auto" checked /> <span>Auto</span></label>
                  <label><input type="radio" name="mode-preference" value="major" /> <span>Major</span></label>
                  <label><input type="radio" name="mode-preference" value="minor" /> <span>Minor</span></label>
                </div>
              </fieldset>
            </div>

            <button id="generate-button" class="generate-button key-generate-button" type="button">Generate</button>
          </section>

          <section class="control-block voicings-block" aria-label="Chord shape controls">
            <div class="control-block-header aligned-control-header">
              <p class="panel-kicker">Chord shapes</p>
              <span class="control-caption" aria-hidden="true"></span>
            </div>

            <div class="checkbox-field checkbox-field-group" aria-label="Chord shapes" role="group">
              <label><input type="checkbox" name="shape-type" value="open" checked /> <span>Open chords</span></label>
              <label><input type="checkbox" name="shape-type" value="barre" /> <span>Barre chords</span></label>
              <label><input type="checkbox" name="shape-type" value="triad" /> <span>Triad shapes</span></label>
              <label><input type="checkbox" name="shape-type" value="power" /> <span>Power chords</span></label>
            </div>

            <fieldset class="checkbox-field checkbox-field-group checkbox-field-group-compact">
              <legend>Chord flavor</legend>
              <label><input type="checkbox" name="flavor-option" value="seventh" /> <span>Sevenths</span></label>
              <label><input type="checkbox" name="flavor-option" value="sus/add" /> <span>Suspended / add9</span></label>
            </fieldset>
          </section>

          <section class="control-block" aria-labelledby="rhythm-heading">
            <div class="control-block-header control-block-header-split">
              <div>
                <p class="panel-kicker">Rhythm</p>
                <h3 id="rhythm-heading">Pocket</h3>
              </div>
              <div class="action-cluster rhythm-actions">
                <label class="transport-toggle">
                  <input id="play-drums-toggle" type="checkbox" checked />
                  <span>Drums</span>
                </label>
                <label class="transport-toggle">
                  <input id="play-chords-toggle" type="checkbox" />
                  <span>Chords</span>
                </label>
                <button id="transport-button" class="transport-button" type="button" aria-pressed="false">Play</button>
              </div>
            </div>

            <label class="field">
              <span class="field-label">Tempo</span>
              <div class="tempo-inputs">
                <input id="tempo-slider" type="range" min="50" max="180" value="92" />
                <label class="tempo-box">
                  <input id="tempo-number" type="number" min="50" max="180" value="92" />
                  <span>BPM</span>
                </label>
              </div>
            </label>

            <div class="rhythm-fields">
              <label class="field">
                <span class="field-label">Meter</span>
                <select id="meter-select">
                  <option value="4/4">4/4</option>
                  <option value="3/4">3/4</option>
                  <option value="6/8">6/8</option>
                </select>
              </label>

              <label class="field">
                <span class="field-label">Groove</span>
                <select id="groove-select"></select>
              </label>
            </div>

            <div class="beat-box">
              <div class="beat-header">
                <span>Beat pulse</span>
              </div>
              <div class="beat-row">
                <div id="beat-indicator" class="beat-indicator" aria-live="polite"></div>
                <strong id="beat-counter-label"></strong>
              </div>
            </div>
          </section>
        </div>

        <p id="generator-warning" class="inline-warning" role="status" aria-live="polite"></p>
      </section>

      <section class="panel progression-panel" aria-label="Progression">
        <div class="progression-body">
          <aside class="progression-key" id="progression-key-display" aria-live="polite"></aside>
          <div id="progression-grid" class="progression-grid" aria-live="polite"></div>
        </div>
      </section>
    </main>
  </div>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
