<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>StrumForge | Guitar Chord Progression Generator</title>
  <meta
    name="description"
    content="StrumForge is a free guitar chord progression generator with playable fretboard diagrams, tempo control, left-handed mode, and built-in drum grooves for practice."
  />
  <meta name="robots" content="index,follow,max-image-preview:large" />
  <meta name="theme-color" content="#f3ede3" />
  <link rel="canonical" href="https://adamspain.com/strumforge" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Adam Spain" />
  <meta property="og:title" content="StrumForge | Guitar Chord Progression Generator" />
  <meta
    property="og:description"
    content="Generate playable guitar chord progressions with chord diagrams, groove controls, and practice-ready rhythm tools in one screen."
  />
  <meta property="og:url" content="https://adamspain.com/strumforge" />
  <meta property="og:image" content="https://adamspain.com/strumforge/strumforge-preview.png" />
  <meta property="og:image:alt" content="StrumForge guitar chord progression generator interface" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="StrumForge | Guitar Chord Progression Generator" />
  <meta
    name="twitter:description"
    content="A free browser-based guitar progression generator with fretboard diagrams, metronome controls, and drum grooves."
  />
  <meta name="twitter:image" content="https://adamspain.com/strumforge/strumforge-preview.png" />
  <script>
    const strumForgeIsNativeApp = window.location.protocol === 'capacitor:' || document.URL.startsWith('capacitor://');
    const viewportMeta = document.querySelector('meta[name="viewport"]');
    if (strumForgeIsNativeApp && viewportMeta) {
      viewportMeta.setAttribute(
        'content',
        'width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover'
      );
    }

    if (!strumForgeIsNativeApp) {
      const preconnectGoogle = document.createElement('link');
      preconnectGoogle.rel = 'preconnect';
      preconnectGoogle.href = 'https://fonts.googleapis.com';
      document.head.append(preconnectGoogle);

      const preconnectStatic = document.createElement('link');
      preconnectStatic.rel = 'preconnect';
      preconnectStatic.href = 'https://fonts.gstatic.com';
      preconnectStatic.crossOrigin = 'anonymous';
      document.head.append(preconnectStatic);

      const fontStylesheet = document.createElement('link');
      fontStylesheet.rel = 'stylesheet';
      fontStylesheet.href = 'https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=DM+Serif+Display:ital@0;1&display=swap';
      document.head.append(fontStylesheet);
    }
  </script>
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "StrumForge",
      "url": "https://adamspain.com/strumforge",
      "description": "A free browser-based guitar chord progression generator with playable fretboard diagrams, tempo control, groove selection, and left-handed support.",
      "applicationCategory": "MusicApplication",
      "operatingSystem": "Any",
      "image": "https://adamspain.com/strumforge/strumforge-preview.png",
      "browserRequirements": "Requires JavaScript and a modern web browser.",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "creator": {
        "@type": "Person",
        "name": "Adam Spain",
        "url": "https://adamspain.com"
      },
      "featureList": [
        "Generate playable four-chord guitar progressions",
        "Show fretboard diagrams for each chord",
        "Filter open, barre, triad, and power chord shapes",
        "Practice with tempo controls and drum grooves",
        "Flip diagrams for left-handed guitar players"
      ]
    }
  </script>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="page-shell">
    <main class="app-shell">
      <section class="panel control-deck" aria-labelledby="controls-heading">
        <div class="panel-heading deck-heading">
          <div class="hero-copy">
            <p class="panel-kicker">StrumForge</p>
            <p class="compact-app-title" aria-hidden="true">StrumForge</p>
            <h1 id="controls-heading">Generate playable guitar chord progressions, right in the pocket.</h1>
          </div>
        </div>

        <div class="status-strip">
          <div class="status-pill">
            <span class="status-label">Current key</span>
            <strong id="current-key-label">Loading…</strong>
          </div>
          <div class="status-pill">
            <span class="status-label">Groove</span>
            <strong id="groove-label">Groove 1</strong>
          </div>
        </div>

        <div class="control-grid">
          <section class="control-block key-block" aria-label="Key controls">
            <div class="key-config-row">
              <div class="field key-config-field select-field key-root-field">
                <div class="field-label-row">
                  <label class="field-label" for="key-root-select">Key</label>
                  <button
                    type="button"
                    class="field-help"
                    aria-label="Key selection help"
                    aria-describedby="key-root-help-tooltip"
                  >
                    i
                    <span id="key-root-help-tooltip" class="field-help-tooltip" role="tooltip">
                      If some keys are unavailable, enable more chord shape options to expand the list.
                    </span>
                  </button>
                </div>
                <select id="key-root-select"></select>
              </div>
              <div class="field key-config-field key-toggle-field">
                <span class="field-label">Diagram</span>
                <label class="toggle-row key-utility-toggle" for="left-handed-toggle">
                  <span>Left-handed</span>
                  <input id="left-handed-toggle" type="checkbox" />
                </label>
              </div>
              <label class="field key-config-field select-field mode-field" for="mode-select">
                <span class="field-label">Mode</span>
                <select id="mode-select" autocomplete="off"></select>
              </label>
            </div>

            <fieldset class="checkbox-field checkbox-field-group checkbox-field-group-compact key-flavor-field key-flavor-field-inline">
              <legend>Chord flavor</legend>
              <label><input type="checkbox" name="flavor-option" value="seventh" /> <span>Sevenths</span></label>
              <label><input type="checkbox" name="flavor-option" value="sus/add" /> <span>Suspended / add9</span></label>
            </fieldset>
          </section>

          <section class="control-block voicings-block" aria-label="Chord shape controls">
            <div class="control-block-header aligned-control-header">
              <p class="panel-kicker">Chord shapes</p>
            </div>

            <div class="checkbox-field checkbox-field-group" aria-label="Chord shapes" role="group">
              <label><input type="checkbox" name="shape-type" value="open" checked /> <span>Open chords</span></label>
              <label><input type="checkbox" name="shape-type" value="barre" /> <span>Barre chords</span></label>
              <label><input type="checkbox" name="shape-type" value="triad" /> <span>Triad shapes</span></label>
              <label><input type="checkbox" name="shape-type" value="power" /> <span>Power chords</span></label>
            </div>

            <fieldset class="checkbox-field checkbox-field-group checkbox-field-group-compact key-flavor-field key-flavor-field-stacked" aria-hidden="true">
              <legend>Chord flavor</legend>
              <label><input type="checkbox" name="flavor-option" value="seventh" /> <span>Sevenths</span></label>
              <label><input type="checkbox" name="flavor-option" value="sus/add" /> <span>Suspended / add9</span></label>
            </fieldset>

          </section>

          <section class="control-block tempo-block" aria-labelledby="tempo-heading">
            <div class="control-block-header aligned-control-header">
              <p class="panel-kicker">Tempo</p>
              <h3 id="tempo-heading" class="sr-only">Tempo controls</h3>
            </div>

            <label class="field">
              <div class="tempo-inputs">
                <input id="tempo-slider" type="range" min="50" max="180" value="92" />
                <label class="tempo-box">
                  <input id="tempo-number" type="number" min="50" max="180" value="92" />
                  <span>BPM</span>
                </label>
              </div>
            </label>

            <div class="rhythm-fields">
              <label class="field">
                <span class="field-label">Meter</span>
                <select id="meter-select" autocomplete="off">
                  <option value="4/4">4/4</option>
                  <option value="3/4">3/4</option>
                  <option value="6/8">6/8</option>
                </select>
              </label>

              <label class="field">
                <span class="field-label">Groove</span>
                <select id="groove-select" autocomplete="off"></select>
              </label>
            </div>

            <div class="beat-box">
              <div class="beat-header">
                <span>Beat pulse</span>
              </div>
              <div class="beat-row">
                <div id="beat-indicator" class="beat-indicator" aria-live="polite"></div>
                <strong id="beat-counter-label"></strong>
              </div>
            </div>
          </section>
        </div>

        <div class="control-actions-slot" id="control-actions-slot">
          <div
            id="primary-action-controls"
            class="action-cluster rhythm-actions primary-action-controls"
            role="group"
            aria-label="Generation and playback controls"
          >
            <button id="generate-button" class="generate-button" type="button">Generate</button>
            <label class="transport-toggle">
              <input id="play-drums-toggle" type="checkbox" data-transport-toggle="drums" checked />
              <span>Drums</span>
            </label>
            <label class="transport-toggle">
              <input id="play-chords-toggle" type="checkbox" data-transport-toggle="chords" />
              <span>Chords</span>
            </label>
            <button
              id="transport-button"
              class="transport-button"
              type="button"
              data-transport-button
              aria-pressed="false"
            >
              Play
            </button>
          </div>
        </div>

      </section>

      <section class="panel progression-panel" aria-label="Progression">
        <div class="progression-body">
          <aside class="progression-key" id="progression-key-display" aria-live="polite"></aside>
          <div id="progression-grid" class="progression-grid" aria-live="polite"></div>
        </div>
      </section>
    </main>

    <footer class="page-footer">
      <span class="footer-web-only">Powered by <a href="https://github.com/aspain/strumforge" target="_blank" rel="noreferrer">aspain/strumforge</a>.</span>
      <a class="footer-star-link footer-web-only" href="https://github.com/aspain/strumforge" target="_blank" rel="noreferrer" aria-label="Star strumforge on GitHub for support">
        <svg viewBox="0 0 16 16" aria-hidden="true" focusable="false">
          <path d="M8 1.2 9.9 5l4.2.6-3 2.9.7 4.1L8 10.6l-3.8 2 .7-4.1-3-2.9L6.1 5 8 1.2Z"></path>
        </svg>
        <span>Star for support</span>
      </a>
      <span class="footer-web-only" aria-hidden="true">&bull;</span>
      <a class="footer-privacy-link" href="./privacy/index.html">Privacy</a>
    </footer>
  </div>

  <div id="diagram-zoom-overlay" class="diagram-zoom-overlay" hidden>
    <div
      class="diagram-zoom-sheet"
      role="dialog"
      aria-modal="true"
      aria-labelledby="diagram-zoom-title"
    >
      <h2 id="diagram-zoom-title" class="sr-only">Chord detail carousel</h2>
      <div class="diagram-zoom-dismiss-handle" aria-hidden="true">
        <span aria-hidden="true"></span>
      </div>
      <button class="diagram-zoom-close" type="button" data-close-diagram-zoom aria-label="Close enlarged chord diagram">
        <svg viewBox="0 0 20 20" aria-hidden="true" focusable="false">
          <path d="M5.4 5.4 14.6 14.6M14.6 5.4 5.4 14.6"></path>
        </svg>
      </button>
      <button class="diagram-zoom-nav diagram-zoom-nav-prev" type="button" data-zoom-nav="-1" aria-label="Previous chord">
        <svg viewBox="0 0 20 20" aria-hidden="true" focusable="false">
          <path d="M12.5 4.5 7 10l5.5 5.5"></path>
        </svg>
      </button>
      <div class="diagram-zoom-viewport" id="diagram-zoom-viewport">
        <div id="diagram-zoom-body" class="diagram-zoom-body"></div>
      </div>
      <button class="diagram-zoom-nav diagram-zoom-nav-next" type="button" data-zoom-nav="1" aria-label="Next chord">
        <svg viewBox="0 0 20 20" aria-hidden="true" focusable="false">
          <path d="M7.5 4.5 13 10l-5.5 5.5"></path>
        </svg>
      </button>
    </div>
  </div>

  <noscript>
    <p class="noscript-copy">
      StrumForge uses JavaScript to generate guitar chord progressions and render fretboard diagrams in the browser.
      Enable JavaScript to use the progression generator, tempo controls, and drum grooves.
    </p>
  </noscript>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
